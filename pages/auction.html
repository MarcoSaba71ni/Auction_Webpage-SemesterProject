<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
        <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Manrope:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Khmer&family=Manrope:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <title> Auction Page || Libertini</title>        
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        <header class="flex justify-between items-center gap-6 border p-4 relative md:grid md:grid-cols-3">
            <div class="pt-2 sm:pr-4">
                <a href="../index.html" class="md:hidden"><img src="../images/Libertini logo-copy.png" class="w-[150px] h-auto object-contain hover:opacity-75 transform transition-transform duration-300 ease-out hover:scale-105"></a>
            </div>
            <div class="hidden md:flex justify-center">
                <a href="../index.html"><img src="../images/Libertini logo-copy.png" class="w-[150px] h-auto object-contain hover:opacity-75 transform transition-transform duration-300 ease-out hover:scale-105"></a>
            </div>
            <div class="flex flex-row items-center gap-8 md:justify-end">
                <div id="profile-div" class="flex gap-8">
                    <a id="logged-in-icon" style="display: none;"><i class="fa-solid fa-user text-3xl cursor-pointer"></i></a>
                    <a id="logged-out-icon"><i class="fa-regular fa-user text-3xl cursor-pointer"></i></a>
                </div>
                <div class="hidden sm:block">
                    <button id="logout-btn" class="p-2 bg-red-700 text-white border rounded-md cursor-pointer" style="display: none;">Logout</button>
                </div>
                <div class="hidden sm:block">
                    <a href="login.html" id="login-btn" class="p-2 bg-green-700 text-white border rounded cursor-pointer">Sign In</a>
                </div>
                <div class="block p-1 rounded-sm cursor-pointer hover:border sm:hidden">
                    <button class="cursor-pointer" id="burguer-btn">
                        <i class="fa-solid fa-bars text-3xl"></i>
                    </button>
                </div>
            </div>
        </header>

       <nav class="border py-3 bg-[#fff7f0] hidden sm:block">
            <ul class="flex justify-center gap-8 text-xl font-[Playfair]">
                <a href="../index.html"><li class="p-2 cursor-pointer border-b-2 border-transparent hover:border-[#432323] hover:text-[#432323] transition-all duration-300 ease-out">Home</li></a>
                <a href="about.html"><li class="p-2 cursor-pointer border-b-2 border-transparent hover:border-[#432323] hover:text-[#432323] transition-all duration-300 ease-out">About Us</li></a>
                <a href="listing.html"><li class="p-2 cursor-pointer border-b-2 border-transparent hover:border-[#432323] hover:text-[#432323] transition-all duration-300 ease-out">Auction</li></a>
            </ul>
        </nav>
        <nav id="dropdown-menu" class="block sm:hidden  border bg-[#fff7f0] block absolute w-25 right-0 top-18">
            <ul class="flex flex-col gap-1 text-md font-[Playfair]">
                <li class="cursor-pointer  hover:bg-[#9c6a6a] transition p-2"><a href="../index.html">Home</a></li>
                <li class="cursor-pointer   hover:bg-[#9c6a6a] transition p-2"><a href="about.html">About Us</a></li>
                <li class="cursor-pointer hover:bg-[#9c6a6a] transition p-2"><a href="listing.html">Auctions</a></li>
                <li id="mobile-logout" class="cursor-pointer hover:bg-red-700 hover:text-white transition p-2"><button id="logout-btn-wrap">Logout</button></li>
            </ul>
        </nav>
        <main class="auction-page-main">     
            <section class="auction-page-shell">
                <section id="register_login-div" class="flex justify-center text-center my-10 px-4">
                    <h2 class="text-sm sm:text-xl">
                    <a href="register.html" class="text-blue-500 hover:text-blue-700">Register</a> /
                    <a href="login.html" class="text-blue-500 hover:text-blue-700">Login</a>
                    to place bids and get exclusive deals.
                    </h2>
                </section>
                <section class="mb-8 flex flex-col" id="auction-wrapper">

                </section>
            </section>
        </main>
        <footer class="flex flex-col bg-[#fff7f0] pt-12 pb-12 gap-12">
            <div class="mx-auto">
                <ul class="flex flex-row gap-12">
                    <li><a href="../index.html" class="p-2 cursor-pointer border-b-2 border-transparent hover:border-[#432323] hover:text-[#432323] transition-all duration-300 ease-out">Home</a></li>
                    <li><a href="about.html" class="p-2 cursor-pointer border-b-2 border-transparent hover:border-[#432323] hover:text-[#432323] transition-all duration-300 ease-out">About Us</a></li>
                    <li><a href="listing.html" class="p-2 cursor-pointer border-b-2 border-transparent hover:border-[#432323] hover:text-[#432323] transition-all duration-300 ease-out">Auctions</a></li>
                </ul>
            </div>
            <div class="mx-auto">
                <img src="../images/Libertini logo-copy.png" class="w-50 object-cover sm:w-100 h-auto transition transform duration-300 ease-out hover:scale-105">
            </div>
        </footer>
        <script type="module" src="../js/src/auction.js"></script>

        <script type="module" src="../js/components/burguer-btn.js"></script>
    </body>
</html>
